<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Hell V12: Combat & Touch Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #050505; color: #e0e0e0; overflow: hidden; touch-action: none; }
        .fantasy-font { font-family: 'MedievalSharp', cursive; }
        
        /* Map & Interaction */
        .map-container { width: 100%; height: 85vh; overflow: hidden; border: 4px solid #1a1a1a; background: #000; border-radius: 15px; position: relative; cursor: grab; }
        #battle-map { width: 3000px; height: 3000px; background-size: contain; background-repeat: no-repeat; position: absolute; transform-origin: 0 0; transition: transform 0.1s ease-out; }
        
        /* Token Style */
        .token { width: 100px; position: absolute; cursor: move; text-align: center; z-index: 10; touch-action: none; user-select: none; }
        .token img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid; object-fit: cover; margin: 0 auto; background: #000; transition: transform 0.2s; }
        .token:active img { transform: scale(1.1); opacity: 0.8; }
        
        /* HP Bar & Effects */
        .hp-container { width: 80px; height: 12px; background: #111; border: 1px solid #333; border-radius: 6px; margin: 5px auto; position: relative; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff3333, #800000); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Damage Flash Animation */
        @keyframes damageFlash { 0% { filter: brightness(5) saturate(0) sepia(1) hue-rotate(-50deg); } 100% { filter: none; } }
        .damage-effect { animation: damageFlash 0.4s ease-out; }
        
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } 75% { transform: translate(-5px, -5px); } }
        .shake-screen { animation: shake 0.3s infinite; }

        .glass-card { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid #222; border-radius: 12px; }
        input, select { background: #000 !important; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 6px; font-size: 13px; }
        .quick-btn { font-size: 11px; padding: 5px; border-radius: 6px; font-weight: bold; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-2">
    <audio id="bgm-player" loop></audio>
    <div id="damage-overlay" class="fixed inset-0 pointer-events-none z-[50] bg-red-900/0 transition-all duration-300"></div>

    <div id="role-selection" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center p-4">
        <h1 class="text-6xl fantasy-font text-red-600 mb-8 tracking-tighter">BATTLE HELL V12</h1>
        <div class="flex gap-4 mb-6">
            <button onclick="checkDMAuth()" class="bg-orange-600 text-white font-black py-3 px-8 rounded-lg hover:bg-orange-500 transition">DM</button>
            <button onclick="$('#login-form').toggle()" class="bg-blue-600 text-white font-black py-3 px-8 rounded-lg hover:bg-blue-500 transition">PLAYER</button>
        </div>
        <div id="login-form" class="hidden glass-card p-6 w-80">
            <input type="text" id="p-name" placeholder="Name" class="w-full mb-3">
            <input type="text" id="p-img" placeholder="Image URL" class="w-full mb-3">
            <select id="p-race" class="w-full mb-4">
                <option value="Human">Human</option>
                <option value="Elf">Elf</option>
                <option value="Orc">Orc</option>
            </select>
            <button onclick="handleLogin()" class="w-full bg-green-600 py-2 rounded-lg font-bold">START</button>
        </div>
    </div>

    <div id="main-ui" class="hidden grid grid-cols-12 gap-4 h-screen">
        <div class="col-span-12 lg:col-span-3 space-y-3 overflow-y-auto pr-2 h-[95vh]">
            <div id="dm-tools" class="hidden glass-card p-4 border-t-4 border-orange-500">
                <h3 class="text-orange-500 font-bold mb-3 uppercase text-xs tracking-widest">Master Panel</h3>
                <div class="space-y-2">
                    <input type="text" id="bgm-input" placeholder="Music Link (.mp3)" class="w-full">
                    <button onclick="updateBGM()" class="w-full bg-zinc-800 py-1 rounded text-[10px]">SET MUSIC</button>
                    <input type="text" id="map-input" placeholder="Map Link" class="w-full">
                    <button onclick="updateVisuals()" class="w-full bg-zinc-800 py-1 rounded text-[10px]">SET MAP</button>
                </div>
                <div class="mt-4 pt-4 border-t border-zinc-800 space-y-2">
                    <input type="text" id="n-name" placeholder="Boss Name" class="w-full">
                    <input type="text" id="n-hp" placeholder="Boss HP" class="w-full">
                    <button onclick="addMonster()" class="w-full bg-red-900 py-1 rounded font-bold text-xs">SUMMON BOSS</button>
                </div>
            </div>

            <div id="game-controls" class="hidden glass-card p-4">
                <div id="my-skills" class="mb-4"></div>
                <div class="bg-zinc-950 p-4 rounded-xl text-center border border-zinc-800">
                    <div class="text-3xl font-black fantasy-font mb-1 text-white"><span id="d1">0</span> + <span id="d2">0</span></div>
                    <div class="text-[10px] text-yellow-500 mb-2">BONUS: +<span id="luck-val">0</span> | TOTAL: <span id="total-score">0</span></div>
                    <button onclick="rollDice()" class="w-full bg-yellow-600 text-black py-3 rounded-lg font-black shadow-lg shadow-yellow-900/20 active:translate-y-1 transition">ROLL ATTACK</button>
                </div>
                <div class="mt-4 flex gap-2">
                    <input type="text" id="new-skill-name" placeholder="New Skill..." class="flex-1 text-xs">
                    <button onclick="requestSkill()" class="bg-blue-600 px-4 rounded text-xs font-bold">SEND</button>
                </div>
            </div>
            
            <div id="game-log" class="glass-card p-3 h-40 overflow-y-auto text-[10px] font-mono text-zinc-500"></div>
        </div>

        <div class="col-span-12 lg:col-span-6">
            <div class="map-container" id="map-container">
                <div id="battle-map"></div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-3">
            <div class="glass-card p-4 border-l-4 border-red-600">
                <h4 class="text-red-600 font-bold text-xs mb-3">TARGETS</h4>
                <div id="boss-list" class="space-y-3"></div>
            </div>
            <div class="glass-card p-4 border-l-4 border-blue-600">
                <h4 class="text-blue-600 font-bold text-xs mb-3">ALLIES</h4>
                <div id="party-list" class="space-y-3"></div>
            </div>
            <div id="dm-approval-box" class="hidden glass-card p-4 border-l-4 border-yellow-500">
                <h4 class="text-yellow-500 font-bold text-xs mb-2">PENDING SKILLS</h4>
                <div id="pending-skills" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="dm-edit-modal" class="hidden fixed inset-0 bg-black/95 z-[2000] flex items-center justify-center p-4">
        <div class="glass-card p-6 w-full max-w-sm border-2 border-orange-600">
            <h2 id="edit-p-name" class="text-xl font-black text-orange-500 mb-6 text-center">CHARACTER PANEL</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-green-500 font-bold uppercase block mb-2">Instant Heal</label>
                    <div class="grid grid-cols-5 gap-1">
                        <button onclick="applyEffect('heal', 10)" class="quick-btn bg-green-950 text-green-400">10</button>
                        <button onclick="applyEffect('heal', 20)" class="quick-btn bg-green-900 text-green-300">20</button>
                        <button onclick="applyEffect('heal', 30)" class="quick-btn bg-green-800 text-green-200">30</button>
                        <button onclick="applyEffect('heal', 40)" class="quick-btn bg-green-700 text-green-100">40</button>
                        <button onclick="applyEffect('heal', 50)" class="quick-btn bg-green-500 text-black">50</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-red-500 font-bold uppercase block mb-2">Instant Damage</label>
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="applyEffect('dmg', 10)" class="quick-btn bg-red-950 text-red-400">10</button>
                        <button onclick="applyEffect('dmg', 20)" class="quick-btn bg-red-900 text-red-300">20</button>
                        <button onclick="applyEffect('dmg', 30)" class="quick-btn bg-red-800 text-red-100">30</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-blue-400 font-bold uppercase block mb-2">Atk Buff</label>
                        <div class="flex gap-1">
                            <button onclick="applyEffect('buff', 1.1)" class="quick-btn bg-blue-900 flex-1">10%</button>
                            <button onclick="applyEffect('buff', 1.15)" class="quick-btn bg-blue-800 flex-1">15%</button>
                            <button onclick="applyEffect('buff', 1.2)" class="quick-btn bg-blue-700 flex-1">20%</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-yellow-500 font-bold uppercase block mb-2">Random Luck</label>
                        <div class="flex gap-1">
                            <button onclick="applyEffect('nerf', 0)" class="quick-btn bg-orange-950 flex-1" title="Random Nerf 25-50%">NERF</button>
                            <button onclick="applyEffect('lucky', 0)" class="quick-btn bg-yellow-600 text-black flex-1" title="Random +1-10">LUCK</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-8 pt-4 border-t border-zinc-800 flex flex-col gap-2">
                <button onclick="applyEffect('reset', 0)" class="w-full bg-zinc-800 py-1 rounded text-[10px] text-zinc-400">RESET ALL STATUS</button>
                <div class="flex gap-2">
                    <button onclick="deleteTarget()" class="flex-1 bg-red-700 py-2 rounded font-bold text-xs">DELETE</button>
                    <button onclick="$('#dm-edit-modal').fadeOut()" class="flex-1 bg-white text-black py-2 rounded font-bold text-xs">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dnd-in-the-hell-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRole = "", myId = "", zoom = 0.6, editingId = "", editingType = "";
        let isPanning = false, startX, startY, mapX = 0, mapY = 0;

        // AUTH & LOGIN
        function checkDMAuth() { if (prompt("PASS:") === "0950378464") { currentRole = "DM"; initApp(); } }
        function handleLogin() {
            const name = $('#p-name').val(); if(!name) return alert("Enter Name");
            myId = "p_" + Date.now();
            db.ref('game/players/' + myId).set({
                name, race: $('#p-race').val(), img: $('#p-img').val() || "https://img2.pic.in.th/pic/user-default.png",
                hp: 100, maxHp: 100, x: 500, y: 1500, status: { atkMod: 1, luck: 0 }
            });
            currentRole = "PLAYER"; initApp();
        }

        function initApp() {
            $('#role-selection').fadeOut(); $('#main-ui').removeClass('hidden');
            if(currentRole === 'DM') { $('#dm-tools, #dm-approval-box').show(); } else { $('#game-controls').show(); }
            syncData(); syncSettings(); initMapControls();
        }

        // TOUCH & MOUSE PANNING (Lifting/Moving Map)
        function initMapControls() {
            const container = document.getElementById('map-container');
            const map = document.getElementById('battle-map');

            container.addEventListener('mousedown', e => { if(e.target.id === 'map-container' || e.target.id === 'battle-map') { isPanning = true; startX = e.pageX - mapX; startY = e.pageY - mapY; container.style.cursor = 'grabbing'; } });
            window.addEventListener('mouseup', () => { isPanning = false; container.style.cursor = 'grab'; });
            window.addEventListener('mousemove', e => { if(!isPanning) return; mapX = e.pageX - startX; mapY = e.pageY - startY; updateMapPos(); });

            // Touch Support
            container.addEventListener('touchstart', e => { if(e.touches.length === 1) { isPanning = true; startX = e.touches[0].pageX - mapX; startY = e.touches[0].pageY - mapY; } }, {passive: false});
            container.addEventListener('touchend', () => { isPanning = false; });
            container.addEventListener('touchmove', e => { if(!isPanning || e.touches.length !== 1) return; mapX = e.touches[0].pageX - startX; mapY = e.touches[0].pageY - startY; updateMapPos(); }, {passive: false});
        }
        function updateMapPos() { $('#battle-map').css('left', mapX + 'px').css('top', mapY + 'px'); }

        // SYNC DATA
        function syncData() {
            // Bosses
            db.ref('game/bosses').on('value', snap => {
                const data = snap.val(); $('.boss-token').remove(); $('#boss-list').empty();
                for(let id in data) {
                    const b = data[id];
                    createToken(id, b, 'boss');
                    renderDashboard(id, b, 'boss', '#boss-list', 'red');
                }
            });
            // Players
            db.ref('game/players').on('value', snap => {
                const data = snap.val(); $('.player-token').remove(); $('#party-list').empty(); $('#pending-skills').empty();
                for(let id in data) {
                    const p = data[id];
                    createToken(id, p, 'player');
                    renderDashboard(id, p, 'player', '#party-list', 'blue');
                    if(id === myId) { $('#luck-val').text(p.status?.luck || 0); renderMySkills(p.skills || []); }
                    if(currentRole==='DM' && p.skills) p.skills.forEach((s, i) => { if(!s.approved) renderApproval(id, p.name, s, i); });
                }
            });
        }

        function createToken(id, data, type) {
            const isMe = id === myId;
            const borderCol = type === 'boss' ? '#dc2626' : (isMe ? '#3b82f6' : '#444');
            const $token = $(`<div id="${id}" class="token ${type}-token" style="left:${data.x}px; top:${data.y}px;">
                <img src="${data.img}" style="border-color:${borderCol}" class="${data.lastDmgAt && Date.now() - data.lastDmgAt < 500 ? 'damage-effect' : ''}">
                <div class="hp-container"><div class="hp-bar-fill" style="width:${(data.hp/data.maxHp)*100}%"></div></div>
                <div class="text-[11px] font-bold bg-black/70 rounded px-1 text-white">${data.name}</div>
            </div>`).appendTo('#battle-map');

            // Dragging Logic (Supports Touch & Mouse via jQuery UI)
            $token.draggable({
                stop: (e, ui) => db.ref(`game/${type}s/${id}`).update({ x: ui.position.left, y: ui.position.top })
            });

            // Effect Trigger (Red Flash Screen when damaged)
            if(data.lastDmgAt && Date.now() - data.lastDmgAt < 500) {
                $('#damage-overlay').addClass('bg-red-900/30');
                $('#map-container').addClass('shake-screen');
                setTimeout(() => { $('#damage-overlay').removeClass('bg-red-900/30'); $('#map-container').removeClass('shake-screen'); }, 400);
            }
        }

        function renderDashboard(id, data, type, target, color) {
            const buffs = (data.status?.atkMod > 1 ? '🔥' : '') + (data.status?.luck > 0 ? '🍀' : '');
            $(`<div class="bg-zinc-900/50 p-2 rounded-lg border border-zinc-800 flex gap-2 items-center">
                <img src="${data.img}" class="w-10 h-10 rounded-full border border-${color}-600">
                <div class="flex-1">
                    <div class="flex justify-between text-[10px] font-bold uppercase"><span>${data.name} ${buffs}</span><span>${data.hp} HP</span></div>
                    <div class="hp-container w-full h-1.5 m-0 mt-1"><div class="hp-bar-fill" style="width:${(data.hp/data.maxHp)*100}%"></div></div>
                </div>
                ${currentRole==='DM' ? `<button onclick="openEdit('${id}', '${type}')" class="bg-orange-600 text-white p-1 rounded">⚙️</button>` : ''}
            </div>`).appendTo(target);
        }

        // INSTANT EFFECTS (HEAL/DMG/BUFF)
        function applyEffect(effect, val) {
            const path = `game/${editingType}s/${editingId}`;
            db.ref(path).once('value', snap => {
                const data = snap.val();
                let update = {};
                if(effect === 'heal') update.hp = Math.min(data.maxHp, data.hp + val);
                if(effect === 'dmg') { update.hp = Math.max(0, data.hp - val); update.lastDmgAt = Date.now(); }
                if(effect === 'buff') update['status/atkMod'] = val;
                if(effect === 'nerf') update['status/atkMod'] = (Math.random() * (0.75 - 0.5) + 0.5).toFixed(2);
                if(effect === 'lucky') update['status/luck'] = Math.floor(Math.random() * 10) + 1;
                if(effect === 'reset') update.status = { atkMod: 1, luck: 0 };
                db.ref(path).update(update);
            });
        }

        // DICE & COMBAT
        function rollDice() {
            if(window.selectedSkillIdx === undefined) return alert("Select Skill!");
            db.ref(`game/players/${myId}`).once('value', snap => {
                const p = snap.val();
                const skill = p.skills[window.selectedSkillIdx];
                if(!skill.approved) return alert("Wait for DM approval");

                const r1 = Math.floor(Math.random() * 20) + 1;
                const r2 = Math.floor(Math.random() * 20) + 1;
                const luck = p.status?.luck || 0;
                const total = r1 + r2 + luck;
                
                $('#d1').text(r1); $('#d2').text(r2); $('#total-score').text(total);

                if(total >= skill.target) {
                    let finalDmg = Math.floor(skill.dmg * (p.status?.atkMod || 1));
                    db.ref('game/bosses').once('value', bSnap => {
                        const bosses = bSnap.val(); if(!bosses) return;
                        const firstBossId = Object.keys(bosses)[0];
                        db.ref(`game/bosses/${firstBossId}`).update({ 
                            hp: Math.max(0, bosses[firstBossId].hp - finalDmg),
                            lastDmgAt: Date.now() 
                        });
                        addLog(`${p.name} HIT Boss with ${skill.name} (-${finalDmg})`, "text-green-500 font-bold");
                    });
                } else { addLog(`${p.name} MISSED!`, "text-red-400"); }
                if(luck > 0) db.ref(`game/players/${myId}/status/luck`).set(0);
            });
        }

        // HELPERS
        function openEdit(id, type) { editingId = id; editingType = type; db.ref(`game/${type}s/${id}/name`).once('value', s => $('#edit-p-name').text(s.val())); $('#dm-edit-modal').fadeIn(); }
        function deleteTarget() { if(confirm("Delete?")) { db.ref(`game/${editingType}s/${editingId}`).remove(); $('#dm-edit-modal').fadeOut(); } }
        function addMonster() { const id = "b_" + Date.now(); const hp = parseInt($('#n-hp').val()) || 1000; db.ref('game/bosses/' + id).set({ name: $('#n-name').val() || "BOSS", img: "https://img2.pic.in.th/pic/boss-default.png", hp: hp, maxHp: hp, x: 1500, y: 500, status: { atkMod: 1, luck: 0 } }); }
        function updateVisuals() { db.ref('game/settings/mapUrl').set($('#map-input').val()); }
        function updateBGM() { db.ref('game/settings/bgmUrl').set($('#bgm-input').val()); }
        function syncSettings() {
            db.ref('game/settings/mapUrl').on('value', snap => { if(snap.val()) $('#battle-map').css('background-image', `url('${snap.val()}')`); });
            db.ref('game/settings/bgmUrl').on('value', snap => { if(snap.val()) { const p=$('#bgm-player')[0]; p.src=snap.val(); p.play().catch(()=>{}); } });
        }
        function addLog(m, c) { $('#game-log').prepend(`<div class="${c}">[LOG] ${m}</div>`); }
        function requestSkill() { const name = $('#new-skill-name').val(); if(!name) return; db.ref(`game/players/${myId}/skills`).once('value', snap => { const s = snap.val() || []; s.push({ name, approved: false }); db.ref(`game/players/${myId}/skills`).set(s); $('#new-skill-name').val(''); }); }
        function renderApproval(pid, pname, skill, idx) { $(`<div class="bg-zinc-800 p-2 rounded text-[10px] border border-zinc-700"><div class="font-bold text-yellow-500">${pname}: ${skill.name}</div><div class="flex gap-1 mt-1"><input type="number" id="dmg-${pid}-${idx}" placeholder="Dmg" class="w-1/2 h-5 text-[10px]"><input type="number" id="req-${pid}-${idx}" placeholder="Req" class="w-1/2 h-5 text-[10px]"><button onclick="approveSkill('${pid}', ${idx})" class="bg-green-600 px-2 rounded">OK</button></div></div>`).appendTo('#pending-skills'); }
        function approveSkill(pid, idx) { const d = parseInt($(`#dmg-${pid}-${idx}`).val()) || 10; const r = parseInt($(`#req-${pid}-${idx}`).val()) || 10; db.ref(`game/players/${pid}/skills/${idx}`).update({ dmg: d, target: r, approved: true }); }
        function renderMySkills(skills) { $('#my-skills').empty(); skills.forEach((s, i) => { $(`<button onclick="window.selectedSkillIdx=${i}; $('.skill-btn').removeClass('border-blue-500'); $(this).addClass('border-blue-500')" class="skill-btn w-full text-left p-2 rounded border border-zinc-800 text-[10px] mb-1 bg-black/40 ${s.approved?'':'opacity-50'}"><div class="flex justify-between font-bold"><span>${s.name}</span> <span>${s.approved ? `Hit:${s.target}+` : 'WAIT'}</span></div></button>`).appendTo('#my-skills'); }); }

    </script>
</body>
</html>
