<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Hell V11: Overlord Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #080808; color: #e0e0e0; overflow: hidden; }
        .fantasy-font { font-family: 'MedievalSharp', cursive; }
        .map-container { width: 100%; height: 85vh; overflow: auto; border: 4px solid #222; background: #000; border-radius: 15px; position: relative; }
        #battle-map { width: 3000px; height: 3000px; background-size: contain; background-repeat: no-repeat; position: relative; transform-origin: 0 0; transition: transform 0.1s ease-out; }
        .token { width: 90px; position: absolute; cursor: grab; text-align: center; z-index: 10; touch-action: none; }
        .token img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid; object-fit: cover; margin: 0 auto; background: #000; }
        .hp-container { width: 75px; height: 10px; background: #111; border: 1px solid #333; border-radius: 5px; margin: 4px auto; position: relative; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4d4d, #990000); transition: width 0.3s; }
        .glass-card { background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); border: 1px solid #333; border-radius: 12px; }
        input, select { background: #000 !important; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 6px; font-size: 12px; }
        .quick-btn { font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: bold; transition: all 0.2s; }
        .quick-btn:hover { filter: brightness(1.2); }
        .zoom-ctrl { position: absolute; bottom: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .zoom-btn { background: #444; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #666; }
    </style>
</head>
<body class="p-2">
    <audio id="bgm-player" loop></audio>

    <div id="role-selection" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center p-4">
        <h1 class="text-7xl fantasy-font text-red-600 mb-10 text-center">NORTHWYRD V11</h1>
        <div class="flex gap-6 mb-8">
            <button onclick="checkDMAuth()" class="bg-yellow-600 text-black font-black py-4 px-10 rounded-xl hover:scale-105 transition">DM COMMAND</button>
            <button onclick="showLogin()" class="bg-blue-700 text-white font-black py-4 px-10 rounded-xl hover:scale-105 transition">PLAYER LOGIN</button>
        </div>
        
        <div id="login-form" class="hidden glass-card p-6 w-full max-w-md border-t-4 border-blue-500">
            <h2 class="text-xl font-bold text-blue-400 mb-4 text-center">CREATE CHARACTER</h2>
            <div class="space-y-3">
                <input type="text" id="p-name" placeholder="Character Name" class="w-full">
                <input type="text" id="p-img" placeholder="Profile Image URL (mp4/jpg/png)" class="w-full">
                <select id="p-race" class="w-full">
                    <option value="Human">Human (Balanced)</option>
                    <option value="Elf">Elf (+Speed/Dmg)</option>
                    <option value="Dwarf">Dwarf (+HP)</option>
                    <option value="Orc">Orc (+Physical Dmg)</option>
                    <option value="Demon">Demon (Chaos)</option>
                </select>
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-black mt-2">ENTER WORLD</button>
            </div>
        </div>
    </div>

    <div id="main-ui" class="hidden grid grid-cols-12 gap-4 h-full">
        <div class="col-span-12 xl:col-span-3 space-y-4 overflow-y-auto h-[95vh]">
            <div id="dm-tools" class="hidden glass-card p-4 border-2 border-yellow-600/30">
                <h3 class="text-yellow-500 font-black text-center border-b border-yellow-900 pb-2 mb-3">MASTER DASHBOARD</h3>
                <div class="space-y-2 mb-4">
                    <input type="text" id="bgm-input" placeholder="Music URL" class="w-full">
                    <button onclick="updateBGM()" class="w-full bg-yellow-700 py-1 rounded text-xs">SET BGM</button>
                    <input type="text" id="map-input" placeholder="Map URL" class="w-full">
                    <button onclick="updateVisuals()" class="w-full bg-blue-900 py-1 rounded text-xs">CHANGE WORLD</button>
                </div>
                <div class="space-y-1 border-t border-gray-800 pt-3">
                    <input type="text" id="n-name" placeholder="Boss Name" class="w-full">
                    <input type="text" id="n-img" placeholder="Boss Img URL" class="w-full">
                    <input type="number" id="n-hp" placeholder="Max HP" class="w-full">
                    <button onclick="addMonster()" class="w-full bg-red-700 font-bold py-1 rounded text-xs">SUMMON BOSS</button>
                </div>
                <button onclick="db.ref('game/settings/victory').set(true)" class="w-full bg-yellow-500 text-black font-black mt-4 py-2 rounded text-sm">VICTORY</button>
            </div>

            <div id="game-controls" class="hidden glass-card p-4">
                <div id="my-skills" class="space-y-2 mb-4"></div>
                <div class="text-center bg-black p-4 rounded-xl border border-white/10">
                    <div class="text-4xl font-black fantasy-font mb-2"><span id="d1">?</span> + <span id="d2">?</span></div>
                    <div class="text-yellow-500 font-black mb-2 uppercase text-xs">Dice Bonus: <span id="luck-val">0</span> | Total: <span id="total-score">0</span></div>
                    <button onclick="rollDice()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-400 text-black py-4 rounded-xl font-black text-xl active:scale-95 transition">ROLL ATTACK</button>
                </div>
                <div class="mt-4 flex gap-1">
                    <input type="text" id="new-skill-name" placeholder="Request Skill..." class="flex-1 text-xs">
                    <button onclick="requestSkill()" class="bg-blue-700 px-3 rounded text-[10px]">LEARN</button>
                </div>
            </div>

            <div id="game-log" class="glass-card p-3 h-48 overflow-y-auto text-[10px] font-mono text-green-500 border-t-2 border-green-900"></div>
        </div>

        <div class="col-span-12 xl:col-span-6 relative">
            <div class="map-container" id="map-container">
                <div id="battle-map"></div>
            </div>
            <div class="zoom-ctrl">
                <button class="zoom-btn" onclick="adjustZoom(0.1)">+</button>
                <button class="zoom-btn" onclick="adjustZoom(-0.1)">-</button>
            </div>
        </div>

        <div class="col-span-12 xl:col-span-3 space-y-4 overflow-y-auto h-[95vh]">
            <div class="glass-card p-3 border-l-4 border-red-600">
                <h4 class="text-red-500 font-black text-xs mb-3">ENEMIES (BOSSES)</h4>
                <div id="boss-list" class="space-y-3"></div>
            </div>
            <div class="glass-card p-3 border-l-4 border-blue-600">
                <h4 class="text-blue-500 font-black text-xs mb-3">PARTY MEMBERS</h4>
                <div id="party-list" class="space-y-3"></div>
            </div>
            <div id="dm-approval-box" class="hidden glass-card p-3 border-l-4 border-yellow-500">
                <h4 class="text-yellow-500 font-black text-xs mb-2">SKILL REQUESTS</h4>
                <div id="pending-skills" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="dm-edit-modal" class="hidden fixed inset-0 bg-black/90 z-[2000] flex items-center justify-center">
        <div class="glass-card p-6 w-96 border-2 border-yellow-600">
            <h2 id="edit-p-name" class="text-xl font-black text-yellow-500 mb-4 text-center">MANAGEMENT</h2>
            <div class="space-y-4">
                <div>
                    <p class="text-[10px] text-green-500 font-bold mb-1 uppercase">Instant Heal</p>
                    <div class="grid grid-cols-5 gap-1">
                        <button onclick="applyEffect('heal', 10)" class="quick-btn bg-green-900">10</button>
                        <button onclick="applyEffect('heal', 20)" class="quick-btn bg-green-800">20</button>
                        <button onclick="applyEffect('heal', 30)" class="quick-btn bg-green-700">30</button>
                        <button onclick="applyEffect('heal', 40)" class="quick-btn bg-green-600">40</button>
                        <button onclick="applyEffect('heal', 50)" class="quick-btn bg-green-500 text-black">50</button>
                    </div>
                </div>
                <div>
                    <p class="text-[10px] text-red-500 font-bold mb-1 uppercase">Instant Damage</p>
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="applyEffect('dmg', 10)" class="quick-btn bg-red-900">10</button>
                        <button onclick="applyEffect('dmg', 20)" class="quick-btn bg-red-800">20</button>
                        <button onclick="applyEffect('dmg', 30)" class="quick-btn bg-red-700">30</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <p class="text-[10px] text-blue-400 font-bold mb-1 uppercase">Atk Buff</p>
                        <div class="flex gap-1">
                            <button onclick="applyEffect('buff', 1.1)" class="quick-btn bg-blue-900 flex-1">10%</button>
                            <button onclick="applyEffect('buff', 1.15)" class="quick-btn bg-blue-800 flex-1">15%</button>
                            <button onclick="applyEffect('buff', 1.2)" class="quick-btn bg-blue-700 flex-1">20%</button>
                        </div>
                    </div>
                    <div>
                        <p class="text-[10px] text-orange-500 font-bold mb-1 uppercase">Status/Luck</p>
                        <div class="flex gap-1">
                            <button onclick="applyEffect('nerf', 0)" class="quick-btn bg-orange-900 flex-1" title="Random Nerf 25-50%">NERF</button>
                            <button onclick="applyEffect('lucky', 0)" class="quick-btn bg-yellow-600 text-black flex-1" title="Random Luck +1-10">LUCK</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-6 border-t border-gray-800 pt-4 space-y-2">
                <button onclick="applyEffect('reset', 0)" class="w-full bg-gray-700 py-1 rounded text-[10px]">RESET ALL BUFFS</button>
                <button onclick="deleteTarget()" class="w-full bg-red-600 py-2 rounded font-bold text-xs">BANISH/DELETE</button>
                <button onclick="$('#dm-edit-modal').fadeOut()" class="w-full bg-white text-black py-1 rounded font-bold text-xs">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dnd-in-the-hell-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRole = "", myId = "", zoom = 0.5, editingId = "", editingType = "";

        function checkDMAuth() { if (prompt("MASTER KEY:") === "0950378464") { currentRole = "DM"; initApp(); } }
        function showLogin() { $('#login-form').fadeIn(); }
        function handleLogin() {
            const name = $('#p-name').val(); if(!name) return alert("Enter Name");
            myId = "p_" + Date.now();
            db.ref('game/players/' + myId).set({
                name, race: $('#p-race').val(), img: $('#p-img').val() || "https://img2.pic.in.th/pic/user-default.png",
                hp: 100, maxHp: 100, x: 500, y: 1500, skills: [], status: { atkMod: 1, luck: 0 }
            });
            currentRole = "PLAYER"; initApp();
        }

        function initApp() {
            $('#role-selection').fadeOut();
            $('#main-ui').removeClass('hidden');
            if(currentRole === 'DM') { $('#dm-tools, #dm-approval-box').show(); } else { $('#game-controls').show(); }
            syncData(); syncSettings();
        }

        function adjustZoom(v) { zoom = Math.max(0.1, Math.min(1.5, zoom + v)); $('#battle-map').css('transform', `scale(${zoom})`); }

        function syncData() {
            // Sync Bosses
            db.ref('game/bosses').on('value', snap => {
                const data = snap.val(); $('.boss-token').remove(); $('#boss-list').empty();
                for(let id in data) {
                    const b = data[id];
                    // Token
                    $(`<div id="${id}" class="token boss-token" style="left:${b.x}px; top:${b.y}px;">
                        <img src="${b.img}" class="border-red-600">
                        <div class="hp-container"><div class="hp-bar-fill" style="width:${(b.hp/b.maxHp)*100}%"></div></div>
                        <div class="text-[10px] bg-black/80 rounded px-1">${b.name}</div>
                    </div>`).appendTo('#battle-map').draggable({
                        drag: (e,ui) => db.ref(`game/bosses/${id}`).update({x: ui.position.left, y: ui.position.top}),
                        stop: (e,ui) => db.ref(`game/bosses/${id}`).update({x: ui.position.left, y: ui.position.top})
                    });
                    // Dashboard
                    $(`<div class="bg-red-950/20 p-2 rounded border border-red-900/50">
                        <div class="flex justify-between text-[10px] font-bold mb-1"><span>${b.name}</span><span>${b.hp}/${b.maxHp}</span></div>
                        <div class="hp-container w-full h-2"><div class="hp-bar-fill" style="width:${(b.hp/b.maxHp)*100}%"></div></div>
                        ${currentRole==='DM' ? `<button onclick="openEdit('${id}', 'boss')" class="bg-yellow-600 text-black text-[8px] px-2 rounded mt-1">EDIT</button>` : ''}
                    </div>`).appendTo('#boss-list');
                }
            });

            // Sync Players
            db.ref('game/players').on('value', snap => {
                const data = snap.val(); $('.player-token').remove(); $('#party-list').empty(); $('#pending-skills').empty();
                for(let id in data) {
                    const p = data[id];
                    // Token
                    $(`<div id="${id}" class="token player-token" style="left:${p.x}px; top:${p.y}px;">
                        <img src="${p.img}" style="border-color:${id===myId?'#3b82f6':'#444'}">
                        <div class="hp-container"><div class="hp-bar-fill" style="width:${(p.hp/p.maxHp)*100}%"></div></div>
                        <div class="text-[10px] bg-black/80 rounded px-1">${p.name}</div>
                    </div>`).appendTo('#battle-map').draggable({
                        drag: (e,ui) => db.ref(`game/players/${id}`).update({x: ui.position.left, y: ui.position.top}),
                        stop: (e,ui) => db.ref(`game/players/${id}`).update({x: ui.position.left, y: ui.position.top})
                    });
                    // Dashboard
                    const buffs = (p.status.atkMod > 1 ? '↑' : '') + (p.status.luck > 0 ? '🍀' : '');
                    $(`<div class="bg-blue-950/20 p-2 rounded border border-blue-900/50 flex gap-2">
                        <img src="${p.img}" class="w-8 h-8 rounded-full object-cover border border-blue-500">
                        <div class="flex-1">
                            <div class="flex justify-between text-[9px] font-black uppercase"><span>${p.name} (${p.race}) ${buffs}</span><span>${p.hp} HP</span></div>
                            <div class="hp-container w-full h-1.5"><div class="hp-bar-fill" style="width:${(p.hp/p.maxHp)*100}%"></div></div>
                        </div>
                        ${currentRole==='DM' ? `<button onclick="openEdit('${id}', 'player')" class="bg-yellow-600 text-black text-[8px] h-fit p-1 rounded">EDIT</button>` : ''}
                    </div>`).appendTo('#party-list');

                    if(id === myId) {
                        $('#luck-val').text(p.status.luck || 0);
                        renderMySkills(p.skills || []);
                    }
                    // Skill Approval for DM
                    if(currentRole==='DM' && p.skills) {
                        p.skills.forEach((s, i) => { if(!s.approved) renderApproval(id, p.name, s, i); });
                    }
                }
            });
        }

        function openEdit(id, type) { 
            editingId = id; editingType = type; 
            db.ref(`game/${type}s/${id}/name`).once('value', s => $('#edit-p-name').text(s.val()));
            $('#dm-edit-modal').fadeIn(); 
        }

        function applyEffect(effect, val) {
            const path = `game/${editingType}s/${editingId}`;
            db.ref(path).once('value', snap => {
                const data = snap.val();
                if(effect === 'heal') db.ref(path).update({ hp: Math.min(data.maxHp, data.hp + val) });
                if(effect === 'dmg') db.ref(path).update({ hp: Math.max(0, data.hp - val) });
                if(effect === 'buff') db.ref(path + '/status').update({ atkMod: val });
                if(effect === 'nerf') db.ref(path + '/status').update({ atkMod: (Math.random() * (0.75 - 0.5) + 0.5).toFixed(2) });
                if(effect === 'lucky') db.ref(path + '/status').update({ luck: Math.floor(Math.random() * 10) + 1 });
                if(effect === 'reset') db.ref(path + '/status').set({ atkMod: 1, luck: 0 });
            });
        }

        function deleteTarget() { if(confirm("Delete this?")) { db.ref(`game/${editingType}s/${editingId}`).remove(); $('#dm-edit-modal').fadeOut(); } }

        function rollDice() {
            if(window.selectedSkillIdx === undefined) return alert("Select Skill First!");
            db.ref(`game/players/${myId}`).once('value', snap => {
                const p = snap.val();
                const skill = p.skills[window.selectedSkillIdx];
                if(!skill.approved) return alert("Skill not approved by DM");

                const r1 = Math.floor(Math.random() * 20) + 1;
                const r2 = Math.floor(Math.random() * 20) + 1;
                const luck = p.status.luck || 0;
                const total = r1 + r2 + luck;
                
                $('#d1').text(r1); $('#d2').text(r2); $('#total-score').text(total);

                if(total >= skill.target) {
                    let finalDmg = Math.floor(skill.dmg * (p.status.atkMod || 1));
                    db.ref('game/bosses').once('value', bSnap => {
                        const bosses = bSnap.val();
                        if(!bosses) return;
                        const firstBossId = Object.keys(bosses)[0];
                        db.ref(`game/bosses/${firstBossId}/hp`).transaction(h => Math.max(0, h - finalDmg));
                        addLog(`${p.name} ใช้ ${skill.name} โจมตีสำเร็จ! สร้างดาเมจ ${finalDmg}`, "text-green-400 font-bold");
                    });
                } else {
                    addLog(`${p.name} โจมตีพลาด! (ต้องการ ${skill.target} ได้ ${total})`, "text-red-500");
                }
                if(luck > 0) db.ref(`game/players/${myId}/status/luck`).set(0); // Use luck once
            });
        }

        function requestSkill() {
            const name = $('#new-skill-name').val(); if(!name) return;
            db.ref(`game/players/${myId}/skills`).once('value', snap => {
                const s = snap.val() || [];
                s.push({ name, approved: false });
                db.ref(`game/players/${myId}/skills`).set(s);
                $('#new-skill-name').val('');
            });
        }

        function renderApproval(pid, pname, skill, idx) {
            $(`<div class="bg-gray-800 p-2 rounded text-[10px] border border-gray-700">
                <div class="font-bold text-yellow-500">${pname}: ${skill.name}</div>
                <div class="flex gap-1 mt-1">
                    <input type="number" id="dmg-${pid}-${idx}" placeholder="Dmg" class="w-1/2 h-5 text-[10px]">
                    <input type="number" id="req-${pid}-${idx}" placeholder="Req" class="w-1/2 h-5 text-[10px]">
                    <button onclick="approveSkill('${pid}', ${idx})" class="bg-green-600 px-2 rounded">OK</button>
                </div>
            </div>`).appendTo('#pending-skills');
        }

        function approveSkill(pid, idx) {
            const d = parseInt($(`#dmg-${pid}-${idx}`).val()) || 10;
            const r = parseInt($(`#req-${pid}-${idx}`).val()) || 10;
            db.ref(`game/players/${pid}/skills/${idx}`).update({ dmg: d, target: r, approved: true });
        }

        function renderMySkills(skills) {
            $('#my-skills').empty();
            skills.forEach((s, i) => {
                $(`<button onclick="window.selectedSkillIdx=${i}; $('.skill-btn').removeClass('border-blue-500'); $(this).addClass('border-blue-500')" 
                    class="skill-btn w-full text-left p-2 rounded border border-gray-700 text-xs mb-1 bg-black/40 ${s.approved?'':'opacity-50'}">
                    <div class="flex justify-between font-bold"><span>${s.name}</span> <span class="text-[9px]">${s.approved ? `Hit: ${s.target}+` : 'PENDING'}</span></div>
                </button>`).appendTo('#my-skills');
            });
        }

        function addMonster() {
            const id = "b_" + Date.now();
            const hp = parseInt($('#n-hp').val()) || 100;
            db.ref('game/bosses/' + id).set({
                name: $('#n-name').val() || "BOSS", img: $('#n-img').val() || "https://img2.pic.in.th/pic/boss-default.png",
                hp: hp, maxHp: hp, x: 1500, y: 500, status: { atkMod: 1, luck: 0 }
            });
        }

        function syncSettings() {
            db.ref('game/settings/mapUrl').on('value', snap => { if(snap.val()) $('#battle-map').css('background-image', `url('${snap.val()}')`); });
            db.ref('game/settings/bgmUrl').on('value', snap => { if(snap.val()) { const p=$('#bgm-player')[0]; p.src=snap.val(); p.play().catch(()=>{}); } });
            db.ref('game/settings/victory').on('value', snap => { if(snap.val()) { confetti(); db.ref('game/settings/victory').set(false); } });
        }
        function updateVisuals() { db.ref('game/settings/mapUrl').set($('#map-input').val()); }
        function updateBGM() { db.ref('game/settings/bgmUrl').set($('#bgm-input').val()); }
        function addLog(m, c) { $('#game-log').prepend(`<div class="${c}">> ${m}</div>`); }

    </script>
</body>
</html>
